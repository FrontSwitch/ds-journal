name: Build

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set OpenSSL dir (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $dir = Split-Path (Get-Command openssl.exe).Path -Parent | Split-Path -Parent
          "OPENSSL_DIR=$dir" | Out-File -Append $env:GITHUB_ENV
          "OPENSSL_LIB_DIR=$dir\lib\VC\x64\MD" | Out-File -Append $env:GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DSJ ${{ github.ref_name }}
          releaseBody: Early access release.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      - name: Build (no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}
